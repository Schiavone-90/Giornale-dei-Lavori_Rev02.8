<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="description" content="Giornale dei Lavori Pubblici" />

    <!-- PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Giornale DL" />

    <!-- PWA Android -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Giornale dei Lavori</title>

    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
      }
      input, select, textarea, button {
        font-family: inherit;
        font-size: 16px; /* evita zoom automatico su iOS */
      }
      /* Scrollbar sottile */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
  </head>
  <body>
    <noscript>Abilita JavaScript per usare questa app.</noscript>
    <div id="root"></div>
  </body>
</html>
